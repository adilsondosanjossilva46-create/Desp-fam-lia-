<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App de Finanças</title>
    
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2910/2910311.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #6366f1; --danger: #ef4444; --success: #22c55e; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
        .container { max-width: 600px; margin: auto; }
        h2 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }
        .card { background: white; padding: 18px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 0.8rem; color: #64748b; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 1rem; }
        .btn-add { background: var(--primary); color: white; }
        .status-box { text-align: center; padding: 20px; border-radius: 16px; margin-bottom: 20px; font-size: 1.3rem; font-weight: 800; }
        .pos { background: #dcfce7; color: var(--success); }
        .neg { background: #fee2e2; color: var(--danger); }
        .chart-container { height: 250px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .btn-clear { background: none; color: #94a3b8; text-decoration: underline; font-size: 0.7rem; border: none; margin-top: 20px; width: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Finanças Familiar</h2>

    <div id="status" class="status-box pos">Saldo: R$ 0,00</div>

    <div class="card">
        <h3>💰 Entradas de Renda</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Fonte 1</label><input type="number" class="r-in" data-idx="0"></div>
            <div><label>Fonte 2</label><input type="number" class="r-in" data-idx="1"></div>
            <div><label>Fonte 3</label><input type="number" class="r-in" data-idx="2"></div>
            <div><label>Fonte 4</label><input type="number" class="r-in" data-idx="3"></div>
        </div>
    </div>

    <div class="card">
        <h3>💸 Registrar Gasto</h3>
        <label>Categoria</label>
        <select id="cat-gasto">
            <option value="Nubank">Nubank</option>
            <option value="Credishopping">Credishopping</option>
            <option value="Água">Água</option>
            <option value="Energia">Energia</option>
            <option value="Gasolina">Gasolina</option>
            <option value="Botijão de Gás">Botijão de Gás</option>
            <option value="Uber">Uber</option>
            <option value="Fim de Semana">Fim de Semana</option>
            <option value="Roupas">Roupas</option>
            <option value="Viagens">Viagens</option>
        </select>
        <label>Valor (R$)</label>
        <input type="number" id="valor-gasto" placeholder="0.00" inputmode="decimal">
        <button class="btn-add" onclick="adicionarGasto()">Salvar Gasto</button>
    </div>

    <div class="card">
        <h3>📈 Resumo de Gastos</h3>
        <div class="chart-container">
            <canvas id="grafico"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>📝 Últimos Lançamentos</h3>
        <table id="tabela">
            <tbody></tbody>
        </table>
        <center><button class="btn-clear" onclick="limparDados()">Zerar todos os dados</button></center>
    </div>
</div>

<script>
    // --- LÓGICA DO APP ---
    let chart;
    let historico = JSON.parse(localStorage.getItem('app_hist')) || [];
    let rendas = JSON.parse(localStorage.getItem('app_rendas')) || [0,0,0,0];

    // Carregar rendas nos campos
    document.querySelectorAll('.r-in').forEach((input, i) => {
        input.value = rendas[i] || "";
        input.addEventListener('input', (e) => {
            rendas[e.target.dataset.idx] = parseFloat(e.target.value) || 0;
            localStorage.setItem('app_rendas', JSON.stringify(rendas));
            atualizarUI();
        });
    });

    function adicionarGasto() {
        const cat = document.getElementById('cat-gasto').value;
        const val = parseFloat(document.getElementById('valor-gasto').value);
        if (!val || val <= 0) return;

        historico.push({
            data: new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}),
            categoria: cat,
            valor: val
        });

        localStorage.setItem('app_hist', JSON.stringify(historico));
        document.getElementById('valor-gasto').value = "";
        atualizarUI();
    }

    function atualizarUI() {
        const totalRenda = rendas.reduce((a, b) => a + b, 0);
        const totalGastos = historico.reduce((a, b) => a + b.valor, 0);
        const saldo = totalRenda - totalGastos;

        const st = document.getElementById('status');
        st.innerText = `Saldo: R$ ${saldo.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
        st.className = saldo >= 0 ? "status-box pos" : "status-box neg";

        const tbody = document.querySelector('#tabela tbody');
        tbody.innerHTML = historico.slice(-5).reverse().map(g => `
            <tr>
                <td>${g.data}</td>
                <td><b>${g.categoria}</b></td>
                <td style="text-align:right; color:#ef4444">-R$ ${g.valor.toFixed(2)}</td>
            </tr>
        `).join('');

        const resumo = historico.reduce((acc, curr) => {
            acc[curr.categoria] = (acc[curr.categoria] || 0) + curr.valor;
            return acc;
        }, {});

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('grafico'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(resumo),
                datasets: [{
                    data: Object.values(resumo),
                    backgroundColor: ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#ec4899']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
        });
    }

    function limparDados() {
        if(confirm("Deseja apagar tudo?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // --- TRANSFORMAR EM APP (AUTO-INSTALÁVEL) ---
    const manifest = {
        "name": "Finanças Familiar",
        "short_name": "Finanças",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#f8fafc",
        "theme_color": "#6366f1",
        "icons": [{ "src": "https://cdn-icons-png.flaticon.com/512/2910/2910311.png", "sizes": "512x512", "type": "image/png" }]
    };
    const stringManifest = JSON.stringify(manifest);
    const blob = new Blob([stringManifest], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(blob);
    document.querySelector('head').innerHTML += `<link rel="manifest" href="${manifestURL}">`;

    if ('serviceWorker' in navigator) {
        const sw = `self.addEventListener('fetch', function(event) { event.respondWith(fetch(event.request)); });`;
        const blobSW = new Blob([sw], {type: 'text/javascript'});
        const swURL = URL.createObjectURL(blobSW);
        navigator.serviceWorker.register(swURL);
    }

    window.onload = atualizarUI;
</script>

</body>
</html>
